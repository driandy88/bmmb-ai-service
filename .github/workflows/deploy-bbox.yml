name: Test, Build & Deploy — Bbox Generator

on:
  pull_request:
    branches: [main]
    paths: ["services/bbox_generator/**"]
  push:
    branches: [main]
    paths: ["services/bbox_generator/**"]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: bbox-generator-service
  REPO_NAME: bmmb-ai-service             # shared Artifact Registry repo across all services in this monorepo
  WORKDIR: services/bbox_generator
  DOCKERFILE: services/bbox_generator/Dockerfile

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tesseract (for pytesseract OCR tests)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Install dependencies
        working-directory: ${{ env.WORKDIR }}
        run: pip install -r requirements.txt -r requirements-dev.txt

      # No GCP credentials needed here: this service never calls Gemini/Vertex
      # AI or BigQuery -- it's pure PDF text-layer / OCR geometry matching.
      - name: Run tests
        working-directory: ${{ env.WORKDIR }}
        run: pytest tests/ -v

  # Only runs after tests pass, and only on pushes to main (not on PRs)
  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for keyless auth if you switch to Workload Identity later
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Build context is the repo root ("."), not $WORKDIR -- see
      # services/bbox_generator/Dockerfile's header comment for why.
      - name: Build image
        run: |
          docker build -f ${{ env.DOCKERFILE }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=bbox-generator-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Show deployed URL
        run: gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format="value(status.url)"
